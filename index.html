<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">

  <title>ハヤト｜本鑑定書</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(
          180deg,
          #080a10 0%,
          #111522 55%,
          #080a10 100%
        );
      color: #f2eee7;
      font-family:
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
      min-height: 100vh;
    }

    .container {
      width: min(100% - 40px, 720px);
      margin: 0 auto;
      padding: 100px 0;
      text-align: center;
    }

    .brand {
      margin-bottom: 18px;
      color: #c7a86b;
      font-size: 13px;
      letter-spacing: 0.3em;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    p {
      margin: 0;
      color: #cac5bb;
      font-size: 15px;
      line-height: 2.1;
    }

    .line {
      width: 50px;
      height: 1px;
      margin: 38px auto;
      background: #9d8250;
    }

    .footer {
      color: #8f8b84;
      font-size: 12px;
      letter-spacing: 0.18em;
    }
  </style>
</head>

<body>
  <main class="container">

    <div class="brand">HAYATO PRIVATE READING</div>

    <h1>本鑑定書</h1>

    <p>
      こちらは、ハヤトの本鑑定をご購入いただいた方へ<br>
      鑑定結果をお届けする専用ページです。
    </p>

    <div class="line"></div>

    <div class="footer">HAYATO</div>

  </main>
</body>
</html>
