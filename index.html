<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>ハヤト｜本鑑定書</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      color: #f3efe8;
      font-family:
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 24, 52, 0.28), transparent 32%),
        radial-gradient(circle at 80% 25%, rgba(215, 182, 110, 0.10), transparent 24%),
        radial-gradient(circle at 50% 85%, rgba(94, 16, 39, 0.25), transparent 34%),
        linear-gradient(180deg, #070910 0%, #111625 48%, #090b12 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 241, 210, 0.07), transparent 18%),
        radial-gradient(circle at 70% 40%, rgba(255, 235, 190, 0.05), transparent 16%),
        radial-gradient(circle at 50% 70%, rgba(255, 255, 255, 0.03), transparent 22%);
      filter: blur(18px);
      opacity: 0.9;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(214, 181, 109, 0.95) 0.8px, transparent 1.2px),
        radial-gradient(circle, rgba(214, 181, 109, 0.55) 0.7px, transparent 1.1px),
        radial-gradient(circle, rgba(255, 244, 215, 0.55) 0.6px, transparent 1px);
      background-size: 180px 180px, 240px 240px, 320px 320px;
      background-position: 20px 40px, 120px 160px, 60px 100px;
      opacity: 0.22;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(100% - 40px, 760px);
      margin: 0 auto;
      padding: 100px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      padding: 64px 32px;
      text-align: center;
      border: 1px solid rgba(199, 168, 107, 0.20);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
    }

    .brand {
      margin-bottom: 16px;
      color: #c8a868;
      font-size: 12px;
      letter-spacing: 0.32em;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.08em;
      line-height: 1.5;
    }

    p {
      margin: 0;
      color: #d2cdc3;
      font-size: 15px;
      line-height: 2.1;
    }

    .line {
      width: 56px;
      height: 1px;
      margin: 34px auto 24px;
      background: linear-gradient(90deg, transparent 0%, #c8a868 50%, transparent 100%);
    }

    .footer {
      color: #9a958b;
      font-size: 12px;
      letter-spacing: 0.18em;
    }

    @media (max-width: 640px) {
      .container {
        padding: 40px 0;
      }

      .card {
        padding: 48px 22px;
        border-radius: 16px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 14px;
        line-height: 2;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <div class="brand">HAYATO PRIVATE READING</div>

      <h1>本鑑定書</h1>

      <p>
        こちらは、ハヤトの本鑑定をご購入いただいた方へ<br>
        鑑定結果をお届けする専用ページです。
      </p>

      <div class="line"></div>

      <div class="footer">HAYATO</div>
    </section>
  </main>
</body>
</html>
